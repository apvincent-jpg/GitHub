<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>

     <link href="style.css" rel="stylesheet">
     <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">

</head>
<body>
    <main>
    <div class="frontOverlay">
    <img class="frontBackground" src="images/game_background.png" alt="background">
    <!-- is there a better way to import my background image, should they move? -->
    <header>
        <h1>ROCK, PAPER, SCISSORS</h1>
    
        <div class="frontImages">
            <!-- rock paper scissor images -->
            <img class="frontRock" src="images/game_rock.png" alt="rock">
            <img class="frontPaper" src="images/game_paper.png" alt="paper">
            <img class="frontScissors" src="images/game_scissors.png" alt="scissors">
        </div>
    </header>
    </div>

    <div class="gamePage">
        <h1>ROCK, PAPER, SCISSORS</h1>
            <!-- see in th game of pig where they put the dice images that come up -->
             <div class="gameImages">
            <img class="frontRock" src="images/game_rock.png" alt="rock">
            <img class="frontPaper" src="images/game_paper.png" alt="paper">
            <img class="frontScissors" src="images/game_scissors.png" alt="scissors">
            </div>

        <div class="playerContainer"> 
        <div class="playerOnePlate">
        <p class="score";> "score" </p>   
        <h3>Player 1</h3>
        </div>

        <div class="playerTwoPlate">
        <p class="score"> "score" </p>
        <h3>Player 2</h3>
        </div>
        </div>


        <p class="shootButton">SHOOT!</p>




    </div>
    </main>


    
</body>
</html>
