<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper, Scissors</title>

     <link href="style.css" rel="stylesheet">
     <script src="script.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&display=swap" rel="stylesheet">

</head>
<body>

    <main>
    <div class="frontOverlay">
    <img class="frontBackground" src="images/game_background.png" alt="background">
    <!-- is there a better way to import my background image, should they move? -->
    <header>
        <h1>ROCK, PAPER, SCISSORS</h1>
    
        <div class="frontImages">
            <!-- rock paper scissor images -->
            <img id="chooseRock" src="images/game_rock.png" alt="rock">
            <img id="choosePaper" src="images/game_paper.png" alt="paper">
            <img id="chooseScissors" src="images/game_scissors.png" alt="scissors">
        </div>
    </header>
    </div>

    <div class="gamePage">
        <h1>ROCK, PAPER, SCISSORS </h1>
            <!-- see in th game of pig where they put the dice images that come up -->
          <div class="playerContainer"> 

    <div class="playerOnePlate">
        <p class="score">0</p>   
        <h3>Player 1</h3>
    </div>

    <div class="gameImages"></div>

    <div class="playerTwoPlate">
        <p class="score">0</p>
        <h3>Player 2</h3>
    </div>

</div>



        <button id="shootButton">SHOOT!</button>

        <!-- audios -->
         <audio id="scissorsBeatsPaper" src="audios/game_scissors_audio.mp3"></audio>
         <audio id="rockBeatsScissors" src="audios/game_rock_audio.mp3"></audio>
         <audio id="paperBeatsRock" src="audios/game_paper_audio.mp3"></audio>
         <audio id="fireSound" src="audios/game_fire_audio.mp3"></audio>
         <audio id="buttonSound" src="audios/game_button_audio.mp3"></audio>

        <button id="nextRoundButton">NEXT ROUND</button>

        <p id="fireNotice"></p>




    </div>

    <div class="winOverlay">
        <p id="winMessage"></p>
        <button id="restartButton">Play Again!</button>
    </div>
    
    </main>

   
    
</body>
</html>
